name: Automated CloudHub Deployment

on:
  push:
    branches: [ main ] # Ensure this matches your branch name (main or master)

jobs:
  deploy-mule-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'maven'

      - name: Deploy to CloudHub
        run: |
          mvn clean deploy -DmuleDeploy \
          -Dconnected.app.clientId=${{ secrets.ANYPOINT_CLIENT_ID }} \
          -Dconnected.app.clientSecret=${{ secrets.ANYPOINT_CLIENT_SECRET }} \
          -Danypoint.env="Sandbox" \
          -Dch.target="DBIZ-NONPROD-PS" \
          -Dapp.name="${{ github.event.repository.name }}-api" \
          -Dbusiness.group="Digital Biz Solutions Pty Ltd"
